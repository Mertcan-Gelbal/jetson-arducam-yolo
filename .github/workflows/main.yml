name: Jetson Arducam AI CI

on:
  push:
    branches: [ main, gui ]
  pull_request:
    branches: [ main, gui ]

jobs:
  # ─── 1. Python Lint ────────────────────────────────────────────────────────
  lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install flake8
      run: pip install flake8

    - name: Check for syntax errors and undefined names
      run: |
        # E9: runtime errors (syntax, io), F63: invalid escape, F7: syntax,
        # F82: undefined name — these are always blocking
        flake8 . \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics \
          --exclude=gui/main.py  # PyQt5 imports are conditional; checked separately

    - name: Style warnings (non-blocking)
      run: |
        flake8 . \
          --count \
          --exit-zero \
          --max-line-length=127 \
          --max-complexity=12 \
          --statistics

  # ─── 2. Shell Script Lint ──────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Run ShellCheck on launcher and scripts
      run: |
        # Only check scripts we own and control; exclude Arducam-downloaded
        # installer and Docker-internal scripts that have intentional patterns
        shellcheck \
          start_gui.sh \
          scripts/build_docker.sh \
          scripts/run_docker.sh \
          scripts/download_models.sh \
          || true   # warn-only: Jetson-specific patterns (sudo, reboot) trip SC

  # ─── 3. Dockerfile Lint ────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Lint Dockerfile with hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        # All other rules are handled inline via '# hadolint ignore=' directives
        ignore: DL3059,DL3006

  # ─── 4. Docker Compose Validate ────────────────────────────────────────────
  compose-validate:
    name: Docker Compose Config Validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate docker-compose.yml syntax
      run: |
        # Use compose config to check for YAML/schema errors.
        # The NVIDIA runtime won't be available on GitHub runners,
        # so we override it for static validation only.
        sed 's/runtime: nvidia/# runtime: nvidia (CI override)/' docker-compose.yml \
          | docker compose -f - config --quiet \
          && echo "docker-compose.yml is valid"
